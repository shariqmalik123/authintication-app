name: Deploy to Firebase

on:
  workflow_dispatch:
    inputs:
      release_notes:
        type: string
        required: true
        default: "Manual Debug Build"
        description: "Release Notes"

permissions:
  contents: write

jobs:
  build:
    name: Building and distributing app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          architecture: x64

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: android

      - name: Bump build number in pubspec.yaml
        shell: bash
        run: |
          set -euo pipefail
          version_line=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          IFS='+' read -r version_name version_code <<< "$version_line"
          version_code=$((version_code + 1))
          new_version="${version_name}+${version_code}"
          sed -i "s/^version: .*/version: ${new_version}/" pubspec.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump build to ${new_version}"
          git push

      - name: Execute Gradle command - assembleDebug
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Upload Artifact to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: android/app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: ${{ inputs.release_notes }}
