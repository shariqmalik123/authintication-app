name: Deploy to Firebase

on:
  workflow_dispatch:
    inputs:
      release_notes:
        type: string
        required: true
        default: "Manual Release Build"
        description: "Release Notes"

permissions:
  contents: write

jobs:
  build:
    name: Build & Distribute APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 4. Install dependencies
      - name: Get dependencies
        run: flutter pub get

      # 5. Build APK (Auto versioning + Split ABI)
      - name: Build Release APKs
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --no-tree-shake-icons \
            --build-name=1.0.${{ github.run_number }} \
            --build-number=${{ github.run_number }}

      # 6. Verify output
      - name: Verify APKs
        run: ls -lah build/app/outputs/flutter-apk/

      # 7. Upload ONLY ARM64 APK to Firebase
      - name: Distribute ARM64 APK
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          releaseNotes: |
            ${{ inputs.release_notes }}
            Version: 1.0.${{ github.run_number }}
            Build: ${{ github.run_number }}
